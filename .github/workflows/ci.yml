name: Database CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  db-migrations:
    name: Database Migrations and Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mydatabase
          POSTGRES_USER: flyway_user
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        # Ensure postgres is ready before starting the job
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Flyway Migrations
        # Using Docker directly to run flyway image as specified
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/migrations:/flyway/sql \
            flyway/flyway:10 \
            -url=jdbc:postgresql://localhost:5432/mydatabase \
            -user=flyway_user \
            -password=password123 \
            migrate

      - name: Verify Database Schema
        env:
          PGPASSWORD: password123
        run: |
          echo "Verifying schema with tests/verify_schema.sql..."
          psql -h localhost -U flyway_user -d mydatabase -f tests/verify_schema.sql
